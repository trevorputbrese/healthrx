spring:
  application:
    name: healthrx
  # Embedded MCP server exposing the agent action tools at /mcp (streamable HTTP), registered
  # behind the MCP gateway. See phase-3-design.md §5.2.
  ai:
    mcp:
      server:
        name: healthrx
        version: 0.1.0
        type: SYNC
        protocol: STREAMABLE
  # Local development datasource (matches compose.yaml). On Cloud Foundry, java-cfenv
  # overrides spring.datasource.* from the bound Postgres service in VCAP_SERVICES.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthrx}
    username: ${SPRING_DATASOURCE_USERNAME:healthrx}
    password: ${SPRING_DATASOURCE_PASSWORD:healthrx}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  # Local RabbitMQ (compose). On Cloud Foundry, java-cfenv maps the bound service to these.
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:healthrx}
    password: ${SPRING_RABBITMQ_PASSWORD:healthrx}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

# Pinned demo clock. Set to "system" (or env HEALTHRX_CLOCK_FIXED_INSTANT=system) for wall clock.
healthrx:
  clock:
    fixed-instant: ${HEALTHRX_CLOCK_FIXED_INSTANT:2026-06-29T00:00:00Z}
  events:
    exchange: healthrx.events
    queue: healthrx.events.api
    dlx: healthrx.events.dlx
    dlq: healthrx.events.api.dlq
    routing-prefix: healthrx.event.
    consumer:
      # Lets tests / brokerless local runs disable the listener container.
      enabled: ${HEALTHRX_EVENTS_CONSUMER_ENABLED:true}
  # Base URL of the generator app; the API proxies the Simulation control panel to it.
  generator:
    url: ${HEALTHRX_GENERATOR_URL:http://localhost:8081}
  # External payer portal (ClearPath Benefits); demo reset clears its submission memory.
  payer-portal:
    url: ${HEALTHRX_PAYER_PORTAL_URL:http://localhost:8084}
  # External patient-assistance portal (BridgeFund); demo reset clears its submission memory.
  assistance-portal:
    url: ${HEALTHRX_ASSISTANCE_PORTAL_URL:http://localhost:8086}
  # Base URLs of the agent apps; the API proxies approve/pause/status to them (phase-3-design.md §8).
  agents:
    adherence-risk:
      url: ${HEALTHRX_ADHERENCE_AGENT_URL:http://localhost:8082}
    access-workflow:
      url: ${HEALTHRX_ACCESS_AGENT_URL:http://localhost:8083}
    financial-assistance:
      url: ${HEALTHRX_FINANCIAL_ASSISTANCE_AGENT_URL:http://localhost:8087}
  # Per-agent shared secrets guarding the embedded MCP action tools until SSO (phase-3-design.md §4).
  mcp:
    agent-keys:
      adherence-risk: ${HEALTHRX_MCP_KEY_ADHERENCE:local-dev-adherence-key}
      access-workflow: ${HEALTHRX_MCP_KEY_ACCESS:local-dev-access-key}
      financial-assistance: ${HEALTHRX_MCP_KEY_FINANCIAL_ASSISTANCE:local-dev-financial-assistance-key}

logging:
  level:
    com.healthrx: INFO
