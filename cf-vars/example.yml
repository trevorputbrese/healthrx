# Template for foundation-specific deployment values.
# Copy to cf-vars/<foundation>.yml, fill in, then:
#   cf push --vars-file cf-vars/<foundation>.yml
#
# All service instances are expected to already exist on the foundation and are bound by
# name — see deploy-from-scratch.md for the create-service commands and ordering.

app_name: healthrx
route: healthrx.<your-apps-domain>

# Phase 2 synthetic data generator app.
generator_app_name: healthrx-generator
generator_route: healthrx-generator.<your-apps-domain>

# Phase 3a Adherence Risk Agent app.
adherence_agent_app_name: healthrx-adherence-agent
adherence_agent_route: healthrx-adherence-agent.<your-apps-domain>
adherence_llm_service_instance: healthrx-adherence-risk-agent-llm

# Phase 3b Access Workflow Agent app.
access_agent_app_name: healthrx-access-agent
access_agent_route: healthrx-access-agent.<your-apps-domain>
access_llm_service_instance: healthrx-access-workflow-agent-llm

# Phase 3c Financial Assistance Agent app.
financial_assistance_agent_app_name: healthrx-financial-assistance-agent
financial_assistance_agent_route: healthrx-financial-assistance-agent.<your-apps-domain>
financial_assistance_llm_service_instance: healthrx-financial-assistance-agent-llm

# ClearPath Benefits payer portal (stand-in external partner for the agent's payer beat).
payer_portal_app_name: clearpath-payer-portal
payer_portal_route: clearpath-payer-portal.<your-apps-domain>

# BridgeFund Patient Assistance portal (stand-in external partner for the FA agent's beat).
assistance_portal_app_name: bridgefund-assistance-portal
assistance_portal_route: bridgefund-assistance-portal.<your-apps-domain>

# Phase 3b knowledge MCP server (internal route only; the gateway path prefix = app name).
knowledge_app_name: healthrx-knowledge-mcp
knowledge_internal_route: healthrx-knowledge-mcp.apps.internal

# Postgres MCP server (vendored in mcp-servers/postgres; internal route only).
postgres_mcp_app_name: healthrx-postgres-mcp-server
postgres_mcp_internal_route: healthrx-postgres-mcp.apps.internal

# MCP gateway. The client-facing URL is the gateway instance's dashboard URL
# (`cf service healthrx-mcp-gw` after creating it). Registered servers live under
# <gateway-url>/<app-name>/mcp.
mcp_gateway_url: https://healthrx-mcp-gw.<your-apps-domain>
mcp_gateway_service_instance: healthrx-mcp-gw
# Internal route the API needs so the gateway can register/reach its embedded MCP server.
mcp_internal_route: healthrx-mcp.apps.internal

# Java buildpack name on the target foundation (run `cf buildpacks`).
# Tanzu foundations commonly use java_buildpack_offline; some use java_buildpack.
buildpack: java_buildpack_offline

# Names of the already-provisioned data service instances to bind.
postgres_service_instance: healthrx-postgres
rabbitmq_service_instance: healthrx-rabbitmq

# Interim per-agent shared secrets for the embedded MCP action tools (until SSO).
# Generate fresh ones per foundation: openssl rand -hex 16
mcp_key_adherence: <openssl rand -hex 16>
mcp_key_access: <openssl rand -hex 16>
mcp_key_financial_assistance: <openssl rand -hex 16>

# The model identifier to send in chat completion requests. Only takes effect if the ai-models
# binding's credentials don't carry model_name directly (varies by foundation/plan) — check via
# `cf service-key <llm-instance> <key-name>` first; if absent, create a service key and call the
# endpoint's config_url (or GET <api_base>/v1/models) to find the advertised model id.
genai_model_name: <model-id-from-config_url-or-v1-models>

# Only used for an optional manual `cf create-service` step; values vary by foundation.
postgres_service_offering: postgres
postgres_service_plan: on-demand
