# techbrese.com foundation. Target before pushing (use this foundation's org name):
#   cf target -o <your-org> -s healthrx
# (HealthRx lives in the `healthrx` space, NOT `pulserx`.)
# Preconditions: both healthrx-postgres and healthrx-rabbitmq must already be provisioned in this
# space (cf services) before `cf push` — the manifest binds both by name (Phase 2 uses RabbitMQ).

app_name: healthrx
route: healthrx.apps.techbrese.com

# Phase 2 synthetic data generator app.
generator_app_name: healthrx-generator
generator_route: healthrx-generator.apps.techbrese.com

# Phase 3a Adherence Risk Agent app.
adherence_agent_app_name: healthrx-adherence-agent
adherence_agent_route: healthrx-adherence-agent.apps.techbrese.com
adherence_llm_service_instance: healthrx-adherence-risk-agent-llm

# Phase 3b Access Workflow Agent app.
access_agent_app_name: healthrx-access-agent
access_agent_route: healthrx-access-agent.apps.techbrese.com
access_llm_service_instance: healthrx-access-workflow-agent-llm

# Phase 3c Financial Assistance Agent app.
financial_assistance_agent_app_name: healthrx-financial-assistance-agent
financial_assistance_agent_route: healthrx-financial-assistance-agent.apps.techbrese.com
financial_assistance_llm_service_instance: healthrx-financial-assistance-agent-llm

# ClearPath Benefits payer portal (stand-in external partner for the agent's payer beat).
payer_portal_app_name: clearpath-payer-portal
payer_portal_route: clearpath-payer-portal.apps.techbrese.com

# BridgeFund Patient Assistance portal (stand-in external partner for the FA agent's beat).
assistance_portal_app_name: bridgefund-assistance-portal
assistance_portal_route: bridgefund-assistance-portal.apps.techbrese.com

# Phase 3b knowledge MCP server (internal route only; path prefix = app name).
knowledge_app_name: healthrx-knowledge-mcp
knowledge_internal_route: healthrx-knowledge-mcp.apps.internal

# Postgres MCP server (vendored in mcp-servers/postgres; internal route only).
postgres_mcp_app_name: healthrx-postgres-mcp-server
postgres_mcp_internal_route: healthrx-postgres-mcp.apps.internal

# MCP gateway (client-facing URL; registered servers live under /<app-name>/mcp).
mcp_gateway_url: https://healthrx-mcp-gw.apps.techbrese.com
mcp_gateway_service_instance: healthrx-mcp-gw
mcp_internal_route: healthrx-mcp.apps.internal

# Interim per-agent shared secrets for the embedded MCP action tools (replaced by SSO later).
# NOT stored here — they live in cf-vars/techbrese.local.yml (gitignored). Deploy with both:
#   cf push --vars-file cf-vars/techbrese.yml --vars-file cf-vars/techbrese.local.yml

# Only used as a fallback if the ai-models binding's credentials don't carry model_name
# (techbrese's gpt-5.4 binding does, so this value is unused there — kept for parity).
genai_model_name: gpt-5.4

# Java buildpack name on this foundation (cf buildpacks). techbrese uses the offline buildpack.
buildpack: java_buildpack_offline

postgres_service_instance: healthrx-postgres
rabbitmq_service_instance: healthrx-rabbitmq

# Reference only (instance already exists); adjust to the foundation's marketplace if you
# ever need to recreate it.
postgres_service_offering: postgres
postgres_service_plan: on-demand
