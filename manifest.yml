# Foundation-neutral Cloud Foundry manifest for HealthRx.
# All foundation-specific values come from a vars file: `cf push --vars-file cf-vars/<foundation>.yml`.
# The app binds an already-provisioned Postgres service instance by name.
---
applications:
  - name: ((app_name))
    path: backend/build/libs/healthrx.jar
    memory: 1G
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    health-check-type: http
    # Liveness only — so a RabbitMQ blip degrades event ingestion without crash-looping the
    # whole API (the read-only UI keeps serving from Postgres).
    health-check-http-endpoint: /actuator/health/liveness
    routes:
      - route: ((route))
      # Internal route: required for MCP-gateway registration (the gateway reaches registered
      # servers over container networking).
      - route: ((mcp_internal_route))
    services:
      - ((postgres_service_instance))
      - ((rabbitmq_service_instance))
      # Registers the embedded MCP action server (/mcp) behind the gateway.
      - ((mcp_gateway_service_instance))
    env:
      # Pin the runtime JRE to 17 so behavior is identical across foundations.
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      # Pinned demo clock. Set to "system" to use real wall-clock time instead.
      HEALTHRX_CLOCK_FIXED_INSTANT: "2026-06-29T00:00:00Z"
      # The API proxies the Simulation control panel to the generator app.
      HEALTHRX_GENERATOR_URL: "https://((generator_route))"
      # Phase 3: the API proxies agent approve/pause/status to the agent apps.
      HEALTHRX_ADHERENCE_AGENT_URL: "https://((adherence_agent_route))"
      HEALTHRX_ACCESS_AGENT_URL: "https://((access_agent_route))"
      # Demo reset also clears the external payer portal's submission memory (best-effort).
      HEALTHRX_PAYER_PORTAL_URL: "https://((payer_portal_route))"
      # Phase 3: per-agent shared secrets guarding the embedded MCP action tools until SSO.
      HEALTHRX_MCP_KEY_ADHERENCE: ((mcp_key_adherence))
      HEALTHRX_MCP_KEY_ACCESS: ((mcp_key_access))
      # Modest JVM footprint for a 1G container.
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"

  # Phase 3a Adherence Risk Agent — senses RefillMissed off RabbitMQ, reasons via its own
  # marketplace LLM instance, and reads/acts exclusively through the MCP gateway (no Postgres
  # binding by design; see phase-3-design.md §3).
  - name: ((adherence_agent_app_name))
    path: agents/adherence-risk-agent/build/libs/healthrx-adherence-risk-agent.jar
    memory: 1G
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    health-check-type: http
    health-check-http-endpoint: /actuator/health/liveness
    routes:
      - route: ((adherence_agent_route))
    services:
      - ((rabbitmq_service_instance))
      - ((adherence_llm_service_instance))
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
      HEALTHRX_MCP_GATEWAY_URL: ((mcp_gateway_url))
      HEALTHRX_MCP_KEY_ADHERENCE: ((mcp_key_adherence))
      # Only used when the ai-models binding doesn't carry model_name in its credentials (some
      # foundations only expose it via the endpoint's config_url, not VCAP_SERVICES).
      GENAI_MODEL: ((genai_model_name))

  # Phase 3b Access Workflow Agent — autonomous low-stakes triage: senses ReferralCreated and
  # scans for stuck referrals, then routes [Agent] tasks through the MCP gateway.
  - name: ((access_agent_app_name))
    path: agents/access-workflow-agent/build/libs/healthrx-access-workflow-agent.jar
    memory: 1G
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    health-check-type: http
    health-check-http-endpoint: /actuator/health/liveness
    routes:
      - route: ((access_agent_route))
    services:
      - ((rabbitmq_service_instance))
      - ((access_llm_service_instance))
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
      HEALTHRX_MCP_GATEWAY_URL: ((mcp_gateway_url))
      HEALTHRX_MCP_KEY_ACCESS: ((mcp_key_access))
      GENAI_MODEL: ((genai_model_name))
      # External payer portal (ClearPath Benefits) the agent contacts for PA decisions.
      HEALTHRX_PAYER_PORTAL_URL: "https://((payer_portal_route))"

  # Phase 3b knowledge MCP server — curated drug/disease guidance tools, registered behind the
  # gateway (internal route only; nothing but the gateway calls it).
  - name: ((knowledge_app_name))
    path: mcp-servers/knowledge/build/libs/healthrx-knowledge-mcp.jar
    memory: 768M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    health-check-type: http
    health-check-http-endpoint: /actuator/health/liveness
    routes:
      - route: ((knowledge_internal_route))
    services:
      - ((mcp_gateway_service_instance))
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"

  # Postgres MCP server — read-only SQL tools (listSchemas/listTables/executeQuery/select) over
  # the HealthRx database, vendored from github.com/luanvuhlu/mcp-server-postgres (MIT license;
  # see mcp-servers/postgres/README-upstream.md) for demo self-containment. Registered behind the
  # gateway (internal route only); no HTTP health-check override (defaults to CF's port check,
  # as it did in the standalone repo).
  - name: ((postgres_mcp_app_name))
    path: mcp-servers/postgres/target/mcp-server-postgres-1.0.0-SNAPSHOT.jar
    memory: 1G
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    routes:
      - route: ((postgres_mcp_internal_route))
    services:
      - ((postgres_service_instance))
      - ((mcp_gateway_service_instance))
    env:
      # This app targets Java 21 (the rest of HealthRx targets 17).
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"

  # ClearPath Benefits payer portal — a stand-in EXTERNAL partner (fictional insurance
  # clearinghouse) the Access Workflow Agent calls over plain HTTPS for prior-auth decisions.
  # Deliberately unbound from every HealthRx service: it represents another company.
  - name: ((payer_portal_app_name))
    path: partners/payer-portal/build/libs/healthrx-payer-portal.jar
    memory: 768M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    health-check-type: http
    health-check-http-endpoint: /actuator/health/liveness
    routes:
      - route: ((payer_portal_route))
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"

  # Phase 2 synthetic data generator — advances the simulated clock and publishes the ambient
  # event stream. Bound to the same Postgres and RabbitMQ instances.
  - name: ((generator_app_name))
    path: generator/build/libs/healthrx-generator.jar
    memory: 1G
    disk_quota: 1G
    instances: 1
    buildpacks:
      - ((buildpack))
    health-check-type: http
    health-check-http-endpoint: /actuator/health/liveness
    routes:
      - route: ((generator_route))
    services:
      - ((postgres_service_instance))
      - ((rabbitmq_service_instance))
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
